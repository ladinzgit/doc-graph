services:
  ngrok:
    profiles:
      - disabled

  postgres:
    ports: !override
      - "5434:5432"
    volumes: !override []
    tmpfs:
      - /var/lib/postgresql/data

  backend:
    environment:
      AI_OPENAI_BASE_URL: http://wiremock:8080
      AI_OPENAI_API_KEY: test
      AI_OPENAI_MODEL: test-model
      NOTION_CLIENT_ID: test
      NOTION_CLIENT_SECRET: test
      NOTION_AUTHORIZATION_URI: http://wiremock:8080/notion/oauth/authorize
      NOTION_TOKEN_URI: http://wiremock:8080/notion/oauth/token

  wiremock:
    image: wiremock/wiremock:3.10.0
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
