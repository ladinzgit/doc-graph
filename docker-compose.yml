services:
  postgres:
    image: postgres:${POSTGRES_VERSION:?}-alpine
    environment:
      POSTGRES_DB: docgraph
      POSTGRES_USER: ${DB_USERNAME:?}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d docgraph"]
      interval: 5s
      timeout: 5s
      retries: 5


  ngrok:
    image: ngrok/ngrok:latest
    command: http host.docker.internal:8080
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?}
    ports:
      - "4040:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: ./apps/backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/docgraph
      DB_USERNAME: ${DB_USERNAME:?}
      DB_PASSWORD: ${DB_PASSWORD:?}
      AI_OPENAI_BASE_URL: ${AI_OPENAI_BASE_URL:?}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:?}
      AI_OPENAI_MODEL: ${AI_OPENAI_MODEL:?}
      NOTION_AUTHORIZATION_URI: ${NOTION_AUTHORIZATION_URI:?}
      NOTION_TOKEN_URI: ${NOTION_TOKEN_URI:?}
      NOTION_CLIENT_ID: ${NOTION_CLIENT_ID:?}
      NOTION_CLIENT_SECRET: ${NOTION_CLIENT_SECRET:?}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/actuator/health | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    profiles:
      - full

volumes:
  postgres_data:
