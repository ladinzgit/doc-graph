services:
  postgres:
    image: postgres:${POSTGRES_VERSION:?}-alpine
    environment:
      POSTGRES_DB: docgraph
      POSTGRES_USER: docgraph
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgraph -d docgraph"]
      interval: 5s
      timeout: 5s
      retries: 5


  ngrok:
    image: ngrok/ngrok:latest
    command: http host.docker.internal:8080
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: ./apps/backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docgraph
      SPRING_DATASOURCE_USERNAME: docgraph
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres_data:
