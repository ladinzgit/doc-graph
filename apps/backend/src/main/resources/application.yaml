server:
  servlet:
    context-path: /api

spring:
  application:
    name: docgraph

  docker:
    compose:
      file: ../../docker-compose.yml

  datasource:
    url: jdbc:postgresql://localhost:5433/docgraph
    username: docgraph
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          notion:
            client-id: local-dev-placeholder
            client-secret: local-dev-placeholder
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: []
        provider:
          notion:
            authorization-uri: https://api.notion.com/v1/oauth/authorize
            token-uri: https://api.notion.com/v1/oauth/token

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health
