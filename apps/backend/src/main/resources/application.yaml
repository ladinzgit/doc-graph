server:
  servlet:
    context-path: /api

spring:
  application:
    name: docgraph

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          notion:
            client-id: ${NOTION_CLIENT_ID}
            client-secret: ${NOTION_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: []
        provider:
          notion:
            authorization-uri: ${NOTION_AUTHORIZATION_URI}
            token-uri: ${NOTION_TOKEN_URI}

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health

ai:
  openai:
    base-url: ${AI_OPENAI_BASE_URL}
    timeout-ms: 30000
    api-key: ${AI_OPENAI_API_KEY}
    model: ${AI_OPENAI_MODEL}
